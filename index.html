<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Center For You | نظام الإدارة المتطور</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" href="Center Logo.png" type="image/png">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- تفعيل الوضع المظلم في Tailwind -->
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root { --primary: #381163; --accent: #d1621f; }
    html, body {
      max-width: 100vw;
      overflow-x: hidden;
    }
    body { 
      font-family: 'Tajawal', sans-serif; 
      background-color: #f8f9fc;
      background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
      background-attachment: fixed;
      transition: background-color 0.5s ease;
    }
    html.dark body {
      background-color: #0f172a;
      background-image: radial-gradient(at 0% 0%, hsla(253,16%,12%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,15%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,15%,1) 0, transparent 50%);
    }
    
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(56, 17, 99, 0.15); border-radius: 10px; }
    html.dark .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); }
    .custom-scrollbar:hover::-webkit-scrollbar-thumb { background: rgba(56, 17, 99, 0.3); }
    
    .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
    html.dark .glass-card { background: rgba(30, 41, 59, 0.75); border: 1px solid rgba(255, 255, 255, 0.05); }
    
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>
</head>
<body class="text-gray-800 dark:text-gray-100 antialiased min-h-screen">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      Users, LayoutDashboard, CalendarCheck, Wallet, Plus, Trash2, 
      TrendingUp, TrendingDown, DollarSign, Search, Edit, Download, 
      Filter, FileSpreadsheet, Sparkles, ChevronLeft, Moon, Sun,
      MessageCircle, Printer, Eye, X, AlertCircle, LogOut, CheckCircle, 
      HelpCircle, FileText, QrCode, Database, ScanLine, Smartphone, Send, ArrowUpDown
    } from 'https://esm.sh/lucide-react@0.344.0';
    
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection, updateDoc } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyC8Rr7SzoPqSBXTO8dnQ-sLeG8pSKnXtng",
      authDomain: "center4u-system.firebaseapp.com",
      projectId: "center4u-system",
      storageBucket: "center4u-system.firebasestorage.app",
      messagingSenderId: "686914654039",
      appId: "1:686914654039:web:43b989a0fbbb415c5df812"
    };

    let app, auth, db;
    if (firebaseConfig && firebaseConfig.apiKey) {
      try { app = initializeApp(firebaseConfig); auth = getAuth(app); db = getFirestore(app); } 
      catch (error) { console.error("Firebase init error:", error); }
    }

    const LOGO_URL = "Center Logo.png";

    function LoginScreen() {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');
        try {
          await signInWithEmailAndPassword(auth, email, password);
        } catch (err) {
          setError('البريد الإلكتروني أو كلمة المرور غير صحيحة.');
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4 relative overflow-hidden" dir="rtl">
          <div className="absolute top-[-10%] right-[-5%] w-72 sm:w-96 h-72 sm:h-96 bg-[#d1621f] rounded-full mix-blend-multiply filter blur-[90px] sm:blur-[128px] opacity-40 animate-blob"></div>
          <div className="absolute bottom-[-10%] left-[-10%] w-72 sm:w-96 h-72 sm:h-96 bg-[#381163] rounded-full mix-blend-multiply filter blur-[90px] sm:blur-[128px] opacity-60 animate-blob animation-delay-2000"></div>
          
          <div className="glass-card p-6 sm:p-12 rounded-3xl sm:rounded-[3rem] w-full max-w-lg shadow-2xl relative z-10 animate-fade-up border-t border-l border-white/40 dark:border-white/10 mx-2">
            <div className="text-center mb-8 sm:mb-10">
              <div className="h-24 sm:h-28 px-4 sm:px-6 py-3 sm:py-4 bg-white rounded-2xl sm:rounded-[2rem] flex items-center justify-center mx-auto mb-6 shadow-xl w-max min-w-[120px] sm:min-w-[150px] transform -rotate-3 hover:rotate-0 transition-transform duration-300">
                 <img src={LOGO_URL} alt="Logo" className="h-full w-auto object-contain" />
              </div>
              <h2 className="text-3xl sm:text-4xl font-black text-[#381163] dark:text-white mb-2">تسجيل الدخول</h2>
              <p className="text-gray-500 dark:text-gray-400 font-medium text-base sm:text-lg">بوابة النظام الآمنة</p>
            </div>

            <form onSubmit={handleSubmit} className="space-y-4 sm:space-y-5">
              <div className="relative">
                <input required type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="البريد الإلكتروني" className="w-full px-5 sm:px-6 py-4 sm:py-5 bg-white/50 dark:bg-slate-800/50 border-2 border-white/60 dark:border-slate-600 rounded-2xl sm:rounded-3xl text-gray-800 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-4 focus:ring-[#381163]/20 focus:border-[#381163]/50 transition-all font-bold text-base sm:text-lg tracking-wide backdrop-blur-sm shadow-inner" dir="ltr" />
              </div>
              <div className="relative">
                <input required type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="كلمة المرور" className="w-full px-5 sm:px-6 py-4 sm:py-5 bg-white/50 dark:bg-slate-800/50 border-2 border-white/60 dark:border-slate-600 rounded-2xl sm:rounded-3xl text-gray-800 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-4 focus:ring-[#381163]/20 focus:border-[#381163]/50 transition-all font-bold text-center text-lg sm:text-xl tracking-widest backdrop-blur-sm shadow-inner" dir="ltr" />
              </div>
              {error && <p className="text-[#ef4444] text-xs sm:text-sm font-bold text-center bg-red-50 dark:bg-red-500/20 py-3 rounded-xl sm:rounded-2xl border border-red-100 dark:border-red-500/30">{error}</p>}
              <button disabled={loading} type="submit" className="w-full relative group overflow-hidden bg-[#381163] text-white py-4 sm:py-5 rounded-2xl sm:rounded-3xl font-black text-lg sm:text-xl shadow-[0_8px_30px_rgb(56,17,99,0.3)] hover:shadow-[0_8px_30px_rgb(56,17,99,0.5)] transition-all hover:-translate-y-1 disabled:opacity-70 disabled:hover:translate-y-0">
                <span className="relative z-10 flex items-center justify-center gap-2">{loading ? 'جاري الدخول...' : 'دخول للنظام'} <ChevronLeft size={24} /></span>
                <div className="absolute inset-0 h-full w-full bg-gradient-to-r from-[#d1621f] to-[#e87a35] opacity-0 group-hover:opacity-100 transition-opacity duration-300 ease-out"></div>
              </button>
            </form>
          </div>
        </div>
      );
    }

    function App() {
      const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('theme') === 'dark');
      useEffect(() => {
        if (isDarkMode) { document.documentElement.classList.add('dark'); localStorage.setItem('theme', 'dark'); } 
        else { document.documentElement.classList.remove('dark'); localStorage.setItem('theme', 'light'); }
      }, [isDarkMode]);
      const toggleTheme = () => setIsDarkMode(!isDarkMode);

      const [isLoggedIn, setIsLoggedIn] = useState(false);
      useEffect(() => {
        if (!auth) return;
        const unsubscribe = onAuthStateChanged(auth, (user) => { setIsLoggedIn(!!user); });
        return () => unsubscribe();
      }, []);
      const handleLogout = () => { signOut(auth); };

      const [activeTab, setActiveTab] = useState('dashboard');
      const [students, setStudents] = useState([]);
      const [attendance, setAttendance] = useState({});
      const [attendanceDate, setAttendanceDate] = useState(new Date().toISOString().split('T')[0]);
      const [transactions, setTransactions] = useState([]);

      const [showStudentForm, setShowStudentForm] = useState(false);
      const [editingStudentId, setEditingStudentId] = useState(null);
      const [searchTermStudents, setSearchTermStudents] = useState('');
      const [filterLevel, setFilterLevel] = useState('الكل');
      const [paymentFilter, setPaymentFilter] = useState('الكل');
      const [sortOrder, setSortOrder] = useState('alphabetical');
      
      const [selectedForPrint, setSelectedForPrint] = useState([]);
      
      const [searchTermAttendance, setSearchTermAttendance] = useState('');
      const [filterLevelAttendance, setFilterLevelAttendance] = useState('الكل');
      const [barcodeInput, setBarcodeInput] = useState('');
      const [scanMessage, setScanMessage] = useState({ text: '', type: '' });
      const [showWhatsAppModal, setShowWhatsAppModal] = useState(false);
      
      const [searchTermFiles, setSearchTermFiles] = useState('');
      const [filterLevelFiles, setFilterLevelFiles] = useState('الكل');
      
      const [newStudent, setNewStudent] = useState({ name: '', phone: '', parentPhone: '', level: 'معادلة معهد', paymentMode: 'cash', totalAmount: '', paidAmount: '', subscriptionType: 'أونلاين وسنتر', notes: '' });
      
      const [showTransactionForm, setShowTransactionForm] = useState(false);
      const [newTransaction, setNewTransaction] = useState({ type: 'income', amount: '', date: new Date().toISOString().split('T')[0], description: '', studentId: '' });
      const [searchTermFinancials, setSearchTermFinancials] = useState('');

      const [payingStudent, setPayingStudent] = useState(null);
      const [installmentAmount, setInstallmentAmount] = useState('');
      const [studentToDelete, setStudentToDelete] = useState(null);
      const [refundAmount, setRefundAmount] = useState('0');
      const [selectedProfile, setSelectedProfile] = useState(null); 
      const [dateFilter, setDateFilter] = useState({ start: '', end: '' }); 

      const [confirmModal, setConfirmModal] = useState({ isOpen: false, text: '', onConfirm: null });
      const confirmAction = (text, onConfirm) => { setConfirmModal({ isOpen: true, text, onConfirm }); };

      const barcodeInputRef = useRef(null);

      useEffect(() => {
        if (!db) return;
        const unsubStudents = onSnapshot(collection(db, 'students'), (snapshot) => { setStudents(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))); });
        const unsubAttendance = onSnapshot(collection(db, 'attendance'), (snapshot) => {
          const attData = {}; snapshot.docs.forEach(doc => { attData[doc.id] = doc.data(); }); setAttendance(attData);
        });
        const unsubTransactions = onSnapshot(collection(db, 'transactions'), (snapshot) => {
          const sorted = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a, b) => new Date(b.date) - new Date(a.date));
          setTransactions(sorted);
        });
        return () => { unsubStudents(); unsubAttendance(); unsubTransactions(); };
      }, []);

      const filteredTransactionsForFinancials = useMemo(() => {
        return transactions.filter(t => {
          if (dateFilter.start && t.date < dateFilter.start) return false;
          if (dateFilter.end && t.date > dateFilter.end) return false;
          if (searchTermFinancials) {
            const studentName = (t.studentId ? students.find(s => s.id === t.studentId)?.name : '') || '';
            const searchLower = searchTermFinancials.toLowerCase();
            if (!t.description.toLowerCase().includes(searchLower) && !studentName.toLowerCase().includes(searchLower)) {
              return false;
            }
          }
          return true;
        });
      }, [transactions, dateFilter, searchTermFinancials, students]);

      const monthlySummary = useMemo(() => {
        const summary = {};
        const monthNames = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
        transactions.forEach(t => {
           const rawMonth = t.date.substring(0, 7); 
           if (!summary[rawMonth]) summary[rawMonth] = { income: 0, expense: 0, raw: rawMonth };
           if (t.type === 'income') summary[rawMonth].income += Number(t.amount);
           else summary[rawMonth].expense += Number(t.amount);
        });
        return Object.values(summary).sort((a,b) => b.raw.localeCompare(a.raw)).map(data => {
           const [year, m] = data.raw.split('-');
           return { name: `${monthNames[parseInt(m) - 1]} ${year}`, ...data };
        });
      }, [transactions]);

      const exportToCSV = (filename, headers, data) => {
        const BOM = '\uFEFF'; 
        const csvContent = [headers.join(','), ...data.map(row => row.map(cell => `"${String(cell || '').replace(/"/g, '""')}"`).join(','))].join('\n');
        const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.setAttribute('download', `${filename}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      const handleLocalBackup = () => {
        const data = { students, attendance, transactions, exportDate: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Center4U_Backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
        confirmAction('تم تحميل نسخة احتياطية من جميع بيانات السنتر بنجاح على جهازك.', () => {});
      };

      const formatWhatsAppLink = (phone, text = '') => {
        if(!phone) return '#';
        let clean = phone.replace(/\D/g, '');
        if(clean.startsWith('0')) clean = '2' + clean; 
        const textParam = text ? `?text=${encodeURIComponent(text)}` : '';
        return `https://wa.me/${clean}${textParam}`;
      };

      const handlePrintReceipt = (transaction, studentName) => {
        const incomeTransactions = transactions.filter(t => t.type === 'income').sort((a,b) => a.createdAt - b.createdAt);
        const receiptIndex = incomeTransactions.findIndex(t => t.id === transaction.id);
        const receiptNo = receiptIndex !== -1 ? receiptIndex + 1001 : Math.floor(Math.random() * 9000) + 1000;

        const printWindow = window.open('', '_blank');
        
        // حل مشكلة حاجب النوافذ المنبثقة (Pop-up Blocker)
        if (!printWindow) {
             confirmAction('⚠️ المتصفح قام بمنع فتح صفحة الطباعة (Pop-up Blocker). يرجى السماح بالنوافذ المنبثقة من أعلى شريط المتصفح للمتابعة.', () => {});
             return;
        }

        printWindow.document.write(`
          <html dir="rtl">
          <head>
            <title>إيصال رقم #${receiptNo}</title>
            <style>
              body { font-family: Tahoma, Arial, sans-serif; padding: 20px; text-align: center; color: #333; background: #fff; }
              .receipt-box { border: 2px dashed #381163; padding: 20px; max-width: 350px; margin: 0 auto; border-radius: 10px; }
              h2 { color: #381163; margin-bottom: 5px; }
              .amount { font-size: 24px; font-weight: bold; color: #10b981; margin: 15px 0; border: 1px solid #eee; padding: 10px; background: #f9f9f9; }
              .details { text-align: right; margin-top: 20px; font-size: 14px; line-height: 1.8; }
              .footer { margin-top: 20px; font-size: 12px; color: #777; border-top: 1px solid #eee; padding-top: 10px; }
            </style>
          </head>
          <body>
            <div class="receipt-box">
              <h2>Center For You</h2>
              <p style="margin: 0; font-size: 12px; color: #666;">إيصال استلام نقدية | رقم #${receiptNo}</p>
              <div class="amount">${transaction.amount} ج.م</div>
              <div class="details">
                <p><strong>التاريخ:</strong> ${transaction.date}</p>
                <p><strong>استلمنا من الطالب/ة:</strong> ${studentName || '................................'}</p>
                <p><strong>وذلك قيمة:</strong> ${transaction.description}</p>
              </div>
              <div class="footer">توقيع المستلم: .....................</div>
              <div style="margin-top: 15px; text-align: right; font-size: 11px; color: #d1621f; background: #fff5f0; border: 1px solid #fed7aa; padding: 10px; border-radius: 5px; line-height: 1.6;">
                <strong style="color: #c2410c;">شروط هامة:</strong><br>
                - في حالة الانسحاب يتم خصم مصاريف الكورسات التي تم حضورها.<br>
                - لا يمكن الانسحاب أو سحب الملف بعد تسجيل الاستمارات.
              </div>
            </div>
            <script>
              window.onload = function() {
                setTimeout(() => { window.print(); window.close(); }, 500);
              };
            <\/script>
          </body>
          </html>
        `);
        // حل مشكلة التعليق الدائم لشاشة التحميل
        printWindow.document.close();
      };

      const handlePrintIDCards = (studentsToPrint) => {
        if (!studentsToPrint || studentsToPrint.length === 0) {
          confirmAction('عفواً، لا يوجد طلاب محددين لطباعة كارنيهاتهم!', () => {});
          return;
        }

        const chunks = [];
        const currentYear = new Date().getFullYear();
        const academicYear = `${currentYear} / ${currentYear + 1}`;
        for (let i = 0; i < studentsToPrint.length; i += 10) {
          let chunk = studentsToPrint.slice(i, i + 10);
          while (chunk.length < 10) chunk.push(null);
          chunks.push(chunk);
        }

        let cardsHtml = '';

        chunks.forEach(chunk => {
          cardsHtml += `<div class="page">`;
          chunk.forEach(student => {
            if (student) {
              const barcodeVal = student.barcode || student.phone;
              cardsHtml += `
                <div class="card front">
                  <div class="header">
                    <h2>Center For You</h2>
                    <span>${academicYear}</span>
                  </div>
                  <div class="content">
                    <h3 class="student-name">${student.name}</h3>
                    <div class="info-grid">
                      <div><span class="label">المرحلة:</span> <span class="value">${student.level}</span></div>
                      <div><span class="label">الاشتراك:</span> <span class="value">كامل</span></div>
                    </div>
                    <div class="barcode-container">
                       <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${barcodeVal}" alt="QR Code" />
                       <div class="barcode-text">${barcodeVal}</div>
                    </div>
                  </div>
                  <div class="footer">
                    قنا - مدينة العمال - امام قصر الثقافة
                  </div>
                </div>
              `;
            } else {
              cardsHtml += `<div class="card empty"></div>`;
            }
          });
          cardsHtml += `</div>`;

          cardsHtml += `<div class="page">`;
          const backOrder = [1, 0, 3, 2, 5, 4, 7, 6, 9, 8];
          backOrder.forEach(idx => {
            const student = chunk[idx];
            if (student) {
              cardsHtml += `
                <div class="card back">
                  <div class="watermark">Center 4U</div>
                  <div class="back-header">تعليمات هامة</div>
                  <ul class="instructions">
                    <li>هذا الكارنيه شخصي ولا يجوز استخدامه لغير حامله.</li>
                    <li>برجاء إبراز الكارنيه دائماً عند الدخول.</li>
                    <li>في حالة الفقدان، يتم دفع غرامة لاستخراج بدل فاقد.</li>
                  </ul>
                  <div class="back-footer">
                    الإدارة: فرع قنا | للتواصل: 01020057744
                  </div>
                </div>
              `;
            } else {
              cardsHtml += `<div class="card empty"></div>`;
            }
          });
          cardsHtml += `</div>`;
        });

        const printWindow = window.open('', '_blank');
        
        // التحقق من تفعيل النوافذ المنبثقة
        if (!printWindow) {
             confirmAction('⚠️ المتصفح قام بمنع فتح صفحة الطباعة (Pop-up Blocker). يرجى السماح بالنوافذ المنبثقة من أعلى شريط المتصفح للمتابعة.', () => {});
             return;
        }

        printWindow.document.write(`
          <html dir="rtl">
          <head>
            <title>طباعة الكارنيهات A4 - QR Codes</title>
            <style>
              @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&display=swap');
              @page { size: A4 portrait; margin: 0; }
              body { 
                font-family: 'Tajawal', sans-serif; 
                margin: 0; 
                padding: 0; 
                background: #e2e8f0; 
              }
              .page {
                width: 210mm;
                height: 297mm;
                background: white;
                margin: 0 auto;
                box-sizing: border-box;
                padding: 6mm 15mm; 
                display: grid;
                grid-template-columns: 8.5cm 8.5cm;
                grid-template-rows: repeat(5, 5.4cm); 
                gap: 4mm 10mm; 
                justify-content: center;
                align-content: center;
                page-break-after: always;
                box-shadow: 0 0 10px rgba(0,0,0,0.1);
              }
              
              .card {
                width: 8.5cm;
                height: 5.4cm;
                border: 1px dashed #94a3b8; 
                border-radius: 8px; 
                box-sizing: border-box;
                position: relative;
                overflow: hidden;
                background: #fff;
                display: flex;
                flex-direction: column;
              }
              .empty { border: none; background: transparent; }

                <input type="text" placeholder="بحث بالوصف/الطالب..." value={searchTermFinancials} onChange={(e) => setSearchTermFinancials(e.target.value)} className="w-full pl-4 pr-12 py-3 bg-white/50 dark:bg-slate-800/50 border border-white dark:border-slate-700 rounded-2xl sm:rounded-full focus:outline-none focus:ring-2 focus:ring-emerald-500/30 dark:focus:ring-emerald-500 font-bold shadow-sm dark:text-white" />
              </div>
              
              <div className="flex items-center bg-white/50 dark:bg-slate-800/50 border border-white dark:border-slate-700 rounded-2xl sm:rounded-full px-3 sm:px-4 py-3 shadow-sm gap-2 font-bold w-full sm:w-auto">
                 <span className="text-gray-400 text-xs sm:text-sm whitespace-nowrap">من:</span>
                 <input type="date" className="bg-transparent outline-none text-xs sm:text-sm text-[#381163] dark:text-indigo-300 cursor-pointer w-full" value={dateFilter.start} onChange={e => setDateFilter({...dateFilter, start: e.target.value})} />
                 <span className="text-gray-400 text-xs sm:text-sm border-r dark:border-slate-600 pr-1 sm:pr-2 whitespace-nowrap">إلى:</span>
                 <input type="date" className="bg-transparent outline-none text-xs sm:text-sm text-[#381163] dark:text-indigo-300 cursor-pointer w-full" value={dateFilter.end} onChange={e => setDateFilter({...dateFilter, end: e.target.value})} />
                 {(dateFilter.start || dateFilter.end) && <button onClick={() => setDateFilter({start:'', end:''})} className="text-red-400 hover:text-red-600 bg-red-50 dark:bg-red-500/20 p-1 rounded-full shrink-0"><X size={16}/></button>}
              </div>
              <div className="flex w-full sm:w-auto gap-2">
                <button onClick={() => {
                  const headers = ['التاريخ', 'النوع', 'المبلغ', 'البيان', 'الطالب المرتبط'];
                  const data = filteredTransactionsForFinancials.map(t => [t.date, t.type === 'income' ? 'إيراد' : 'مصروف', t.amount, t.description, t.studentId ? (students.find(s=>s.id===t.studentId)?.name || '') : '']);
                  exportToCSV('المالية', headers, data);
                }} className="flex-1 sm:flex-none justify-center bg-white dark:bg-slate-800 text-emerald-600 dark:text-emerald-400 border border-emerald-100 dark:border-slate-700 hover:bg-emerald-50 dark:hover:bg-slate-700 px-4 sm:px-6 py-3 sm:py-4 rounded-2xl sm:rounded-full flex items-center gap-2 font-bold transition-all shadow-sm"><FileSpreadsheet size={20} className="sm:w-[22px] sm:h-[22px]"/> إكسيل</button>
                <button onClick={() => setShowTransactionForm(!showTransactionForm)} className="flex-[2] sm:flex-none justify-center bg-gradient-to-r from-emerald-500 to-teal-500 text-white px-4 sm:px-8 py-3 sm:py-4 rounded-2xl sm:rounded-full font-black flex items-center gap-2 hover:shadow-lg hover:-translate-y-1 transition-all whitespace-nowrap"><Plus size={20} className="sm:w-[22px] sm:h-[22px]"/> حركة</button>
              </div>
            </div>
          </div>

          {showTransactionForm && (
            <form onSubmit={handleAddTransaction} className="glass-card p-5 sm:p-8 rounded-3xl sm:rounded-[2.5rem] border-t-4 border-emerald-500 animate-fade-up grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 sm:gap-6">
               <div className="space-y-2"><label className="text-gray-600 dark:text-gray-300 font-bold ml-2 text-sm sm:text-base">نوع الحركة</label><select className="w-full px-4 sm:px-5 py-3 sm:py-4 bg-white/80 dark:bg-slate-900/60 border-0 dark:border dark:border-slate-700 rounded-xl sm:rounded-2xl focus:ring-2 focus:ring-emerald-500/30 font-bold dark:text-white" value={newTransaction.type} onChange={e => setNewTransaction({...newTransaction, type: e.target.value})}><option value="income">🟢 إيراد (مقبوضات)</option><option value="expense">🔴 مصروف (مدفوعات)</option></select></div>
               <div className="space-y-2"><label className="text-gray-600 dark:text-gray-300 font-bold ml-2 text-sm sm:text-base">المبلغ (ج.م)</label><input required type="number" className="w-full px-4 sm:px-5 py-3 sm:py-4 bg-white/80 dark:bg-slate-900/60 border-0 dark:border dark:border-slate-700 rounded-xl sm:rounded-2xl focus:ring-2 focus:ring-emerald-500/30 font-black text-lg dark:text-white" value={newTransaction.amount} onChange={e => setNewTransaction({...newTransaction, amount: e.target.value})} /></div>
               <div className="space-y-2"><label className="text-gray-600 dark:text-gray-300 font-bold ml-2 text-sm sm:text-base">التاريخ</label><input required type="date" className="w-full px-4 sm:px-5 py-3 sm:py-4 bg-white/80 dark:bg-slate-900/60 border-0 dark:border dark:border-slate-700 rounded-xl sm:rounded-2xl focus:ring-2 focus:ring-emerald-500/30 font-bold dark:text-white" value={newTransaction.date} onChange={e => setNewTransaction({...newTransaction, date: e.target.value})} /></div>
               <div className="space-y-2"><label className="text-gray-600 dark:text-gray-300 font-bold ml-2 text-sm sm:text-base">البيان (الوصف)</label><input required type="text" placeholder="مثال: قسط فلان، فاتورة كهرباء" className="w-full px-4 sm:px-5 py-3 sm:py-4 bg-white/80 dark:bg-slate-900/60 border-0 dark:border dark:border-slate-700 rounded-xl sm:rounded-2xl focus:ring-2 focus:ring-emerald-500/30 font-bold dark:text-white" value={newTransaction.description} onChange={e => setNewTransaction({...newTransaction, description: e.target.value})} /></div>
               <div className="xl:col-span-4 flex justify-end mt-2"><button type="submit" className="w-full md:w-auto justify-center bg-emerald-500 text-white px-8 sm:px-10 py-3 sm:py-4 rounded-xl sm:rounded-full font-black text-base sm:text-lg shadow-lg hover:-translate-y-1 transition-all">حفظ الحركة</button></div>
            </form>
          )}

          <div className="glass-card rounded-3xl sm:rounded-[2.5rem] overflow-hidden shadow-sm">
            <div className="overflow-x-auto custom-scrollbar">
              <table className="w-full text-right min-w-[850px]">
                <thead className="bg-[#381163]/5 dark:bg-slate-800 border-b border-[#381163]/10 dark:border-slate-700">
                  <tr><th className="px-6 sm:px-8 py-4 sm:py-6 font-black text-[#381163] dark:text-indigo-300">التاريخ</th><th className="px-6 sm:px-8 py-4 sm:py-6 font-black text-[#381163] dark:text-indigo-300">النوع</th><th className="px-6 sm:px-8 py-4 sm:py-6 font-black text-[#381163] dark:text-indigo-300">المبلغ</th><th className="px-6 sm:px-8 py-4 sm:py-6 font-black text-[#381163] dark:text-indigo-300">البيان</th><th className="px-6 sm:px-8 py-4 sm:py-6 font-black text-[#381163] dark:text-indigo-300 text-center">إجراء</th></tr>
                </thead>
                <tbody className="divide-y divide-gray-100/50 dark:divide-slate-700/50">
                  {filteredTransactionsForFinancials.length === 0 ? 
                    <tr><td colSpan="5" className="p-6 sm:p-8 text-center text-gray-500 dark:text-gray-400 font-bold">لا توجد حركات مطابقة لبحثك في هذه الفترة</td></tr> :
                  filteredTransactionsForFinancials.map(t => {
                    const studentName = t.studentId ? students.find(s => s.id === t.studentId)?.name : null;
                    return (
                    <tr key={t.id} className="hover:bg-white/60 dark:hover:bg-slate-800/40 transition-colors">
                      <td className="px-6 sm:px-8 py-4 sm:py-5 font-bold text-gray-500 dark:text-gray-400 text-sm sm:text-base">{t.date}</td>
                      <td className="px-6 sm:px-8 py-4 sm:py-5">{t.type === 'income' ? <span className="text-emerald-700 dark:text-emerald-400 bg-emerald-100 dark:bg-emerald-500/20 px-3 sm:px-4 py-1.5 rounded-full font-black text-xs sm:text-sm">إيراد ↗</span> : <span className="text-red-700 dark:text-red-400 bg-red-100 dark:bg-red-500/20 px-3 sm:px-4 py-1.5 rounded-full font-black text-xs sm:text-sm">مصروف ↙</span>}</td>
                      <td className="px-6 sm:px-8 py-4 sm:py-5 font-black text-lg sm:text-xl">{t.amount} <span className="text-xs sm:text-sm font-bold text-gray-400 dark:text-gray-500">ج</span></td>
                      <td className="px-6 sm:px-8 py-4 sm:py-5 font-bold text-gray-700 dark:text-gray-300 text-sm sm:text-base">{t.description} {studentName && <span className="text-indigo-500 text-[10px] sm:text-xs mr-2 bg-indigo-50 dark:bg-indigo-500/20 px-2 py-1 rounded inline-block mt-1 sm:mt-0">طالب: {studentName}</span>}</td>
                      <td className="px-6 sm:px-8 py-4 sm:py-5 text-center whitespace-nowrap">
                        {t.type === 'income' && <button onClick={() => handlePrintReceipt(t, studentName)} className="mx-0.5 sm:mx-1 p-2 sm:p-3 bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-600 rounded-lg sm:rounded-xl transition-colors inline-flex" title="طباعة إيصال"><Printer size={16} className="sm:w-[18px] sm:h-[18px]"/></button>}
                        <button onClick={() => handleDeleteTransaction(t.id)} className="mx-0.5 sm:mx-1 p-2 sm:p-3 bg-red-50 dark:bg-red-500/20 text-red-500 dark:text-red-400 hover:bg-red-500 hover:text-white rounded-lg sm:rounded-xl transition-colors inline-flex" title="حذف"><Trash2 size={16} className="sm:w-[18px] sm:h-[18px]"/></button>
                      </td>
                    </tr>
                  )})}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );

      if (!isLoggedIn) return <LoginScreen />;

      return (
        <div className="min-h-screen relative" dir="rtl">
          <div className="fixed inset-0 pointer-events-none flex items-center justify-center z-0">
             <img src={LOGO_URL} alt="Watermark" className="w-[300px] md:w-[500px] object-contain opacity-5 dark:opacity-[0.03] grayscale hover:grayscale-0 transition-all duration-1000" />
          </div>

          <header className="hidden md:flex sticky top-6 z-40 mx-6 bg-white/70 dark:bg-slate-900/80 backdrop-blur-2xl border border-white dark:border-slate-700 shadow-[0_8px_30px_rgb(0,0,0,0.04)] rounded-full px-8 py-4 justify-between items-center">
            <div className="flex items-center gap-4">
              <div className="h-12 px-3 py-1.5 bg-white dark:bg-slate-800 rounded-2xl shadow-sm flex items-center justify-center">
                 <img src={LOGO_URL} alt="Logo" className="h-full w-auto object-contain" />
              </div>
              <h1 className="text-2xl font-black text-[#381163] dark:text-white tracking-tight">Center<span className="text-[#d1621f] dark:text-orange-400">4U</span></h1>
            </div>
            <nav className="flex gap-2">
              <button onClick={() => setActiveTab('dashboard')} className={`px-6 py-3 rounded-full font-bold transition-all flex items-center gap-2 ${activeTab === 'dashboard' ? 'bg-[#381163] dark:bg-indigo-600 text-white shadow-lg' : 'text-gray-500 dark:text-gray-400 hover:bg-white/80 dark:hover:bg-slate-800'}`}><LayoutDashboard size={20}/> الرئيسية</button>
              <button onClick={() => setActiveTab('students')} className={`px-6 py-3 rounded-full font-bold transition-all flex items-center gap-2 ${activeTab === 'students' ? 'bg-[#381163] dark:bg-indigo-600 text-white shadow-lg' : 'text-gray-500 dark:text-gray-400 hover:bg-white/80 dark:hover:bg-slate-800'}`}><Users size={20}/> الطلاب</button>
              <button onClick={() => setActiveTab('attendance')} className={`px-6 py-3 rounded-full font-bold transition-all flex items-center gap-2 ${activeTab === 'attendance' ? 'bg-[#381163] dark:bg-indigo-600 text-white shadow-lg' : 'text-gray-500 dark:text-gray-400 hover:bg-white/80 dark:hover:bg-slate-800'}`}><CalendarCheck size={20}/> الحضور</button>
              <button onClick={() => setActiveTab('files')} className={`px-6 py-3 rounded-full font-bold transition-all flex items-center gap-2 ${activeTab === 'files' ? 'bg-[#381163] dark:bg-indigo-600 text-white shadow-lg' : 'text-gray-500 dark:text-gray-400 hover:bg-white/80 dark:hover:bg-slate-800'}`}><FileText size={20}/> الملفات</button>
              <button onClick={() => setActiveTab('financials')} className={`px-6 py-3 rounded-full font-bold transition-all flex items-center gap-2 ${activeTab === 'financials' ? 'bg-[#381163] dark:bg-indigo-600 text-white shadow-lg' : 'text-gray-500 dark:text-gray-400 hover:bg-white/80 dark:hover:bg-slate-800'}`}><Wallet size={20}/> المالية</button>
            </nav>
            <div className="flex items-center gap-2">
              <button onClick={handleLocalBackup} title="نسخ احتياطي محلي للبيانات" className="p-3 bg-emerald-50 dark:bg-emerald-500/20 text-emerald-600 dark:text-emerald-400 hover:bg-emerald-100 dark:hover:bg-emerald-500/40 rounded-full transition-all flex items-center gap-2 font-bold shadow-sm">
                 <Database size={20} />
              </button>
              <button onClick={toggleTheme} title="تغيير المظهر" className="p-3 bg-indigo-50 dark:bg-slate-800 text-[#381163] dark:text-indigo-400 hover:bg-indigo-100 dark:hover:bg-slate-700 rounded-full transition-all flex items-center gap-2 font-bold shadow-sm">
                 {isDarkMode ? <Sun size={20} /> : <Moon size={20} />}
              </button>
              <button onClick={handleLogout} title="تسجيل الخروج" className="p-3 bg-red-50 dark:bg-red-500/20 text-red-500 dark:text-red-400 hover:bg-red-500 hover:text-white dark:hover:bg-red-500 dark:hover:text-white rounded-full transition-all flex items-center gap-2 font-bold shadow-sm">
                 <LogOut size={20} />
              </button>
            </div>
          </header>

          <nav className="md:hidden fixed bottom-4 left-2 right-2 z-50 bg-white/95 dark:bg-slate-900/95 backdrop-blur-xl border border-white/50 dark:border-slate-700 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] rounded-[2rem] p-2 flex justify-between items-center px-2 overflow-x-auto custom-scrollbar gap-1">
              <button onClick={() => setActiveTab('dashboard')} className={`p-2 sm:p-3 min-w-[55px] rounded-[1.5rem] flex flex-col items-center gap-1 transition-all ${activeTab === 'dashboard' ? 'bg-[#381163] dark:bg-indigo-600 text-white shadow-md -translate-y-1' : 'text-gray-400 dark:text-gray-500'}`}><LayoutDashboard size={20}/><span className="text-[10px] font-black">الرئيسية</span></button>
              <button onClick={() => setActiveTab('students')} className={`p-2 sm:p-3 min-w-[55px] rounded-[1.5rem] flex flex-col items-center gap-1 transition-all ${activeTab === 'students' ? 'bg-[#381163] dark:bg-indigo-600 text-white shadow-md -translate-y-1' : 'text-gray-400 dark:text-gray-500'}`}><Users size={20}/><span className="text-[10px] font-black">الطلاب</span></button>
              <button onClick={() => setActiveTab('attendance')} className={`p-2 sm:p-3 min-w-[55px] rounded-[1.5rem] flex flex-col items-center gap-1 transition-all ${activeTab === 'attendance' ? 'bg-[#381163] dark:bg-indigo-600 text-white shadow-md -translate-y-1' : 'text-gray-400 dark:text-gray-500'}`}><CalendarCheck size={20}/><span className="text-[10px] font-black">الحضور</span></button>
              <button onClick={() => setActiveTab('files')} className={`p-2 sm:p-3 min-w-[55px] rounded-[1.5rem] flex flex-col items-center gap-1 transition-all ${activeTab === 'files' ? 'bg-[#381163] dark:bg-indigo-600 text-white shadow-md -translate-y-1' : 'text-gray-400 dark:text-gray-500'}`}><FileText size={20}/><span className="text-[10px] font-black">الملفات</span></button>
              <button onClick={() => setActiveTab('financials')} className={`p-2 sm:p-3 min-w-[55px] rounded-[1.5rem] flex flex-col items-center gap-1 transition-all ${activeTab === 'financials' ? 'bg-[#381163] dark:bg-indigo-600 text-white shadow-md -translate-y-1' : 'text-gray-400 dark:text-gray-500'}`}><Wallet size={20}/><span className="text-[10px] font-black">المالية</span></button>
              
              <div className="flex gap-0.5 border-r border-gray-200 dark:border-slate-700 pr-1 ml-1">
                <button onClick={handleLocalBackup} className="p-2 sm:p-3 rounded-[1.5rem] flex flex-col items-center gap-1 transition-all text-emerald-500 dark:text-emerald-400"><Database size={20}/></button>
                <button onClick={toggleTheme} className="p-2 sm:p-3 rounded-[1.5rem] flex flex-col items-center gap-1 transition-all text-[#381163] dark:text-indigo-400"><div className="animate-pulse">{isDarkMode ? <Sun size={20}/> : <Moon size={20}/>}</div></button>
                <button onClick={handleLogout} className="p-2 sm:p-3 rounded-[1.5rem] flex flex-col items-center gap-1 transition-all text-red-400 hover:text-red-600"><LogOut size={20}/></button>
              </div>
          </nav>

          <main className="px-4 sm:px-6 pt-6 sm:pt-8 pb-32 md:pb-12 w-full max-w-7xl mx-auto overflow-x-hidden">
            {activeTab === 'dashboard' && renderDashboard()}
            {activeTab === 'students' && renderStudents()}
            {activeTab === 'attendance' && renderAttendance()}
            {activeTab === 'files' && renderFiles()}
            {activeTab === 'financials' && renderFinancials()}
          </main>

          {/* Custom Confirm Modal Layer */}
          {confirmModal.isOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-[#381163]/40 dark:bg-slate-900/60 backdrop-blur-sm animate-in fade-in">
              <div className="bg-white dark:bg-slate-800 rounded-[2.5rem] p-8 w-full max-w-md shadow-2xl animate-in zoom-in-95 border-t-4 border-[#d1621f]">
                <div className="flex flex-col items-center text-center">
                  <div className="w-16 h-16 bg-orange-50 dark:bg-orange-500/20 text-[#d1621f] dark:text-orange-400 rounded-full flex items-center justify-center mb-4"><HelpCircle size={32}/></div>
                  <h3 className="text-2xl font-black text-gray-800 dark:text-white mb-6 leading-relaxed">{confirmModal.text}</h3>
                </div>
                <div className="flex gap-3 mt-2">
                  <button onClick={() => { confirmModal.onConfirm(); setConfirmModal({isOpen: false, text: '', onConfirm: null}); }} className="flex-1 bg-gradient-to-r from-[#d1621f] to-[#e87a35] hover:shadow-lg text-white py-4 rounded-2xl font-black text-lg transition-all hover:-translate-y-1">تأكيد</button>
                  <button onClick={() => setConfirmModal({isOpen: false, text: '', onConfirm: null})} className="flex-1 bg-gray-100 dark:bg-slate-700 hover:bg-gray-200 dark:hover:bg-slate-600 text-gray-700 dark:text-white py-4 rounded-2xl font-black text-lg transition-colors">إلغاء</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
